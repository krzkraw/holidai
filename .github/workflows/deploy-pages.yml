name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site artifact
        run: |
          mkdir -p site/gpt site/gemini
          cp index.html site/index.html
          cp gpt/ultimate-desktop.html site/gpt/ultimate-desktop.html
          cp gpt/ultimate-mobile.html site/gpt/ultimate-mobile.html
          cp gemini/2026-holidai-v1.html site/gemini/2026-holidai-v1.html
          cp gemini/2026-holidai-v2.html site/gemini/2026-holidai-v2.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
